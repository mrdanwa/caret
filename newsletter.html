<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--  -->
    <!--    Document Title-->
    <!-- =============================================-->
    <title>Gracias por su interés | Caret Capital</title>
    <!--  -->
    <!--    Favicons-->
    <!--    =============================================-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicons/favicon-16x16.png"
    />
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="assets/images/favicons/favicon.ico"
    />
    <link rel="manifest" href="assets/images/favicons/site.webmanifest" />

    <meta name="theme-color" content="#ffffff" />
    <!--  -->
    <!--    Stylesheets-->
    <!--    =============================================-->
    <!-- Essential stylesheets-->
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600,700|Open+Sans:300,400,600,700,800"
      rel="stylesheet"
    />
    <link
      href="assets/lib/font-awesome/css/font-awesome.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow-x: hidden;
      }

      /* Newsletter Thank You Page Styles */
      .thank-you-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        background: linear-gradient(
          135deg,
          #f0f9f6 0%,
          #e8f5f0 25%,
          #f5fbf8 50%,
          #e8f5f0 75%,
          #f0f9f6 100%
        );
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        position: relative;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .thank-you-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
            circle at 20% 50%,
            rgba(0, 66, 37, 0.03) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 89, 47, 0.02) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      .thank-you-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        padding: 4.5rem 3.5rem 3.5rem 3.5rem;
        border-radius: 24px;
        border: 1px solid rgba(0, 66, 37, 0.08);
        box-shadow: 0 25px 80px rgba(0, 66, 37, 0.12),
          0 10px 30px rgba(0, 66, 37, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        max-width: 620px;
        width: 100%;
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.8s ease-out;
        transform: translateY(0);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-container {
        margin-bottom: 3rem;
        animation: fadeIn 1s ease-out 0.2s both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .logo-container img {
        max-width: 200px;
        height: auto;
        filter: drop-shadow(0 6px 12px rgba(0, 66, 37, 0.08));
        transition: transform 0.3s ease;
      }

      .logo-container:hover img {
        transform: scale(1.02);
      }

      .thank-you-title {
        font-family: "Montserrat", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: #004225;
        margin-bottom: 1.25rem;
        line-height: 1.3;
        letter-spacing: -0.02em;
        animation: fadeIn 1s ease-out 0.4s both;
      }

      .thank-you-message {
        font-family: "Open Sans", sans-serif;
        font-size: 1.15rem;
        color: #4a5568;
        margin-bottom: 1.5rem;
        line-height: 1.7;
        font-weight: 400;
        animation: fadeIn 1s ease-out 0.6s both;
      }

      .thank-you-submessage {
        font-family: "Open Sans", sans-serif;
        font-size: 1rem;
        color: #718096;
        margin-bottom: 3rem;
        line-height: 1.6;
        font-weight: 300;
        animation: fadeIn 1s ease-out 0.8s both;
      }

      .home-button {
        background: linear-gradient(135deg, #004225 0%, #00592f 100%);
        color: white;
        border: none;
        padding: 1rem 2.5rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 50px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 6px 20px rgba(0, 66, 37, 0.25),
          0 2px 8px rgba(0, 66, 37, 0.15);
        font-family: "Montserrat", sans-serif;
        letter-spacing: 0.01em;
        position: relative;
        overflow: hidden;
        animation: fadeIn 1s ease-out 1s both;
      }

      .home-button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .home-button:hover::before {
        left: 100%;
      }

      .home-button:hover {
        background: linear-gradient(135deg, #00592f 0%, #006b38 100%);
        color: white;
        text-decoration: none;
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 66, 37, 0.35),
          0 4px 12px rgba(0, 66, 37, 0.2);
      }

      .home-button:active {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 66, 37, 0.3);
      }

      .home-button i {
        margin-left: 0.75rem;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 0.9rem;
      }

      .home-button:hover i {
        transform: translateX(4px);
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .thank-you-container {
          padding: 1.5rem;
        }

        .thank-you-card {
          padding: 3.5rem 2.5rem 3rem 2.5rem;
          border-radius: 20px;
        }

        .thank-you-title {
          font-size: 1.75rem;
        }

        .thank-you-message {
          font-size: 1.05rem;
        }

        .thank-you-submessage {
          font-size: 0.95rem;
        }

        .logo-container {
          margin-bottom: 2.5rem;
        }

        .logo-container img {
          max-width: 160px;
        }
      }

      @media (max-width: 480px) {
        .thank-you-card {
          padding: 3rem 2rem 2.5rem 2rem;
          border-radius: 18px;
        }

        .thank-you-title {
          font-size: 1.5rem;
          margin-bottom: 1rem;
        }

        .thank-you-message {
          font-size: 1rem;
          margin-bottom: 1.25rem;
        }

        .thank-you-submessage {
          font-size: 0.9rem;
          margin-bottom: 2.5rem;
        }

        .home-button {
          padding: 0.9rem 2rem;
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="thank-you-container">
        <div class="thank-you-card">
          <div class="logo-container">
            <img
              src="assets/images/logo/logo4.webp"
              alt=""
              style="width: 50px; margin-right: 10px"
              loading="lazy"
            />
            <img
              src="assets/images/logo/logo7.webp"
              alt="Caret Capital Logo"
              style="width: 200px"
              loading="lazy"
            />
          </div>

          <h1 class="thank-you-title">¡Gracias por confiar en nosotros!</h1>

          <p class="thank-you-message">
            Hemos recibido su solicitud correctamente.
          </p>

          <p class="thank-you-submessage">
            Nuestro equipo se pondrá en contacto con usted para proporcionarle
            toda la información que necesita sobre el proyecto.
          </p>

          <a href="index.html" class="home-button">
            Volver al inicio
            <i class="fa fa-chevron-right"></i>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
